kind = "web"
previewPath = "/"
title = "Dashboard de Férias"
version = "1.0.0"
id = "artifacts/vacation-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20421

[services.development]
run = "pnpm --filter @workspace/vacation-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vacation-dashboard", "run", "build" ]
publicDir = "artifacts/vacation-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20421"
BASE_PATH = "/"
